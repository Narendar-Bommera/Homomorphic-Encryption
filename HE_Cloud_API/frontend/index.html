<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HE Sum Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Homomorphic Encryption Sum Demo</h1>

        <input type="number" id="num1" placeholder="Enter Number 1">
        <input type="number" id="num2" placeholder="Enter Number 2">
        <input type="number" id="num3" placeholder="Enter Number 3">

        <button id="encryptBtn">Encrypt & Send</button>

        <div class="results">
            <p>Encrypted Num1: <span id="enc1">-</span></p>
            <p>Encrypted Num2: <span id="enc2">-</span></p>
            <p>Encrypted Num3: <span id="enc3">-</span></p>
            <p>Encrypted Sum: <span id="encSum">-</span></p>
            <p>Final Decrypted Sum: <span id="decSum">-</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
